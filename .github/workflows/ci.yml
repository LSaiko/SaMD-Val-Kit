name: SaMD Validation Toolkit CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Suite — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run test suite
      run: |
        pytest tests/ -v --tb=short

    - name: Check code style
      run: |
        pip install black flake8
        black --check samd_toolkit/ tests/ examples/
        flake8 samd_toolkit/ --max-line-length=120 --ignore=E501

  demo-smoke-test:
    name: Demo Smoke Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install
      run: pip install -e .
    - name: Run Class I demo
      run: python examples/class_i_wellness_app.py
    - name: Run Class II demo
      run: python examples/class_ii_ecg_monitor.py
    - name: Run Class III demo
      run: python examples/class_iii_closed_loop_insulin.py

  security-scan:
    name: Security — Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Safety
      run: pip install safety
    - name: Scan dependencies for CVEs
      run: safety check -r requirements.txt || true
      # Note: 'true' prevents CI failure on known acceptable issues.
      # In production SaMD CI/CD, remove '|| true' and treat high CVEs as blockers.
